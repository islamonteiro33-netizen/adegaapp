import React, { useEffect, useMemo, useState } from 'react';
import {
  ActivityIndicator,
  Alert,
  FlatList,
  Linking,
  RefreshControl,
  SafeAreaView,
  ScrollView,
  StatusBar as RNStatusBar,
  StyleSheet,
  Text,
  TextInput,
  TouchableOpacity,
  View,
} from 'react-native';
import { StatusBar } from 'expo-status-bar';
import AsyncStorage from '@react-native-async-storage/async-storage';

const API_URL = 'https://chamabebidas.com.br/api';

type Store = {
  id: number;
  store_name?: string;
  name?: string;
  phone?: string;
  email?: string;
  city?: string;
};

type OrderItem = {
  id?: number;
  name?: string;
  title?: string;
  product_name?: string;
  quantity?: number;
  qty?: number;
  price?: number;
  unit_price?: number;
};

type Order = {
  id: number;
  customerName?: string;
  customer_name?: string;
  customerPhone?: string;
  customer_phone?: string;
  phone?: string;
  address?: string;
  delivery_address?: string;
  status: string;
  total?: number;
  total_amount?: number;
  items?: OrderItem[];
  createdAt?: string;
  created_at?: string;
};

const DEMO_ORDERS: Order[] = [
  {
    id: 1001,
    status: 'pending',
    customerName: 'Cliente Teste',
    customerPhone: '15999999999',
    address: 'Rua Exemplo, 123 - Tatuí',
    total: 87.9,
    items: [
      { name: 'Cerveja Heineken 350ml', quantity: 6, price: 5.99 },
      { name: 'Energético', quantity: 2, price: 12.99 },
    ],
  },
  {
    id: 1002,
    status: 'preparing',
    customerName: 'Pedido Demonstração',
    customerPhone: '15988888888',
    address: 'Centro - Tatuí',
    total: 129.8,
    items: [
      { name: 'Whisky', quantity: 1, price: 99.9 },
      { name: 'Gelo', quantity: 2, price: 14.95 },
    ],
  },
];

export default function App() {
  const [screen, setScreen] = useState<'login' | 'orders' | 'settings'>('login');
  const [storeId, setStoreId] = useState('');
  const [password, setPassword] = useState('');
  const [storeName, setStoreName] = useState('');
  const [stores, setStores] = useState<Store[]>([]);
  const [orders, setOrders] = useState<Order[]>([]);
  const [apiOnline, setApiOnline] = useState<boolean | null>(null);
  const [usingDemo, setUsingDemo] = useState(false);
  const [loading, setLoading] = useState(false);
  const [actionLoading, setActionLoading] = useState<number | null>(null);

  const totals = useMemo(() => {
    const active = orders.filter(o => !['delivered', 'cancelled'].includes(o.status));
    const pending = orders.filter(o => o.status === 'pending').length;
    const ready = orders.filter(o => o.status === 'ready').length;
    return { active: active.length, pending, ready };
  }, [orders]);

  useEffect(() => {
    boot();
  }, []);

  useEffect(() => {
    if (screen === 'orders') {
      loadOrders();
      const timer = setInterval(loadOrders, 15000);
      return () => clearInterval(timer);
    }
  }, [screen, storeId]);

  async function boot() {
    await checkApi();
    await loadStores();

    const savedId = await AsyncStorage.getItem('storeId');
    const savedName = await AsyncStorage.getItem('storeName');

    if (savedId) {
      setStoreId(savedId);
      setStoreName(savedName || `Adega #${savedId}`);
      setScreen('orders');
    }
  }

  async function checkApi() {
    try {
      const res = await fetch(`${API_URL.replace('/api', '')}/`, { method: 'GET' });
      setApiOnline(res.ok);
    } catch {
      setApiOnline(false);
    }
  }

  async function loadStores() {
    try {
      const res = await fetch(`${API_URL}/stores`);
      const data = await res.json();

      if (Array.isArray(data)) {
        setStores(data);
      }
    } catch {
      setStores([]);
    }
  }

  async function login() {
    const cleanStoreId = storeId.trim();

    if (!cleanStoreId) {
      Alert.alert('Atenção', 'Digite o ID da adega.');
      return;
    }

    setLoading(true);

    try {
      let logged = false;
      let foundName = '';

      try {
        const res = await fetch(`${API_URL}/stores/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ storeId: cleanStoreId, password }),
        });

        const data = await res.json();

        if (res.ok && data.success !== false) {
          logged = true;
          foundName = data.store?.store_name || data.store?.name || data.storeName || '';
        }
      } catch {
        // A rota de login pode ainda não existir na API.
      }

      if (!logged) {
        const found = stores.find(s => String(s.id) === cleanStoreId);
        if (found) {
          logged = true;
          foundName = found.store_name || found.name || `Adega #${found.id}`;
        }
      }

      if (!logged && stores.length === 0) {
        logged = true;
        foundName = `Adega #${cleanStoreId}`;
      }

      if (!logged) {
        Alert.alert('Erro', 'Adega não encontrada. Confira o ID.');
        return;
      }

      await AsyncStorage.setItem('storeId', cleanStoreId);
      await AsyncStorage.setItem('storeName', foundName || `Adega #${cleanStoreId}`);

      setStoreName(foundName || `Adega #${cleanStoreId}`);
      setScreen('orders');
    } finally {
      setLoading(false);
    }
  }

  async function logout() {
    await AsyncStorage.removeItem('storeId');
    await AsyncStorage.removeItem('storeName');
    setStoreId('');
    setPassword('');
    setOrders([]);
    setScreen('login');
  }

  async function loadOrders() {
    if (!storeId.trim()) return;

    setLoading(true);

    try {
      const endpoints = [
        `${API_URL}/stores/${storeId}/orders`,
        `${API_URL}/orders?storeId=${storeId}`,
        `${API_URL}/orders`,
      ];

      let loaded: Order[] | null = null;

      for (const url of endpoints) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;

          const data = await res.json();
          const list = Array.isArray(data) ? data : data.orders || data.data || null;

          if (Array.isArray(list)) {
            loaded = list;
            break;
          }
        } catch {
          // tenta o próximo endpoint
        }
      }

      if (loaded) {
        setOrders(loaded);
        setUsingDemo(false);
      } else {
        setOrders(DEMO_ORDERS);
        setUsingDemo(true);
      }
    } catch {
      setOrders(DEMO_ORDERS);
      setUsingDemo(true);
    } finally {
      setLoading(false);
    }
  }

  async function updateStatus(orderId: number, status: string) {
    if (usingDemo) {
      setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status } : o));
      return;
    }

    setActionLoading(orderId);

    try {
      const res = await fetch(`${API_URL}/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });

      let data: any = {};
      try {
        data = await res.json();
      } catch {
        data = {};
      }

      if (!res.ok || data.success === false) {
        Alert.alert('Erro', data.message || 'Não foi possível atualizar o pedido.');
        return;
      }

      await loadOrders();
    } catch {
      Alert.alert('Erro', 'Falha ao conectar com a API.');
    } finally {
      setActionLoading(null);
    }
  }

  function getCustomerName(order: Order) {
    return order.customerName || order.customer_name || 'Cliente não informado';
  }

  function getPhone(order: Order) {
    return order.customerPhone || order.customer_phone || order.phone || '';
  }

  function getAddress(order: Order) {
    return order.address || order.delivery_address || 'Endereço não informado';
  }

  function getTotal(order: Order) {
    return Number(order.total ?? order.total_amount ?? 0);
  }

  function statusText(status: string) {
    const map: Record<string, string> = {
      pending: 'Novo pedido',
      accepted: 'Aceito',
      preparing: 'Preparando',
      ready: 'Pronto',
      calling_driver: 'Chamando entregador',
      driver_accepted: 'Entregador aceitou',
      picked_up: 'Saiu para entrega',
      delivered: 'Entregue',
      cancelled: 'Cancelado',
    };

    return map[status] || status;
  }

  function statusStyle(status: string) {
    if (status === 'pending') return styles.badgePending;
    if (status === 'ready') return styles.badgeReady;
    if (status === 'cancelled') return styles.badgeCancelled;
    if (status === 'delivered') return styles.badgeDelivered;
    return styles.badgeDefault;
  }

  function openWhatsApp(phone: string) {
    if (!phone) {
      Alert.alert('Telefone', 'Este pedido não tem telefone cadastrado.');
      return;
    }

    const clean = phone.replace(/\D/g, '');
    const brPhone = clean.startsWith('55') ? clean : `55${clean}`;
    Linking.openURL(`https://wa.me/${brPhone}`);
  }

  function renderOrder({ item }: { item: Order }) {
    const phone = getPhone(item);

    return (
      <View style={styles.card}>
        <View style={styles.rowBetween}>
          <View>
            <Text style={styles.orderTitle}>Pedido #{item.id}</Text>
            <Text style={styles.orderDate}>{item.createdAt || item.created_at || 'Agora'}</Text>
          </View>

          <Text style={[styles.badge, statusStyle(item.status)]}>
            {statusText(item.status)}
          </Text>
        </View>

        <View style={styles.divider} />

        <Info label="Cliente" value={getCustomerName(item)} />
        <Info label="Telefone" value={phone || 'Não informado'} />
        <Info label="Endereço" value={getAddress(item)} />

        <Text style={styles.label}>Itens</Text>
        {item.items && item.items.length > 0 ? (
          item.items.map((p, index) => {
            const qty = p.quantity || p.qty || 1;
            const name = p.name || p.title || p.product_name || 'Produto';
            const price = Number(p.price ?? p.unit_price ?? 0);

            return (
              <Text key={`${item.id}-${index}`} style={styles.itemText}>
                {qty}x {name}{price > 0 ? ` - R$ ${price.toFixed(2)}` : ''}
              </Text>
            );
          })
        ) : (
          <Text style={styles.text}>Itens não informados pela API</Text>
        )}

        <Text style={styles.total}>Total: R$ {getTotal(item).toFixed(2)}</Text>

        {actionLoading === item.id ? (
          <ActivityIndicator color="#111" style={{ marginTop: 14 }} />
        ) : (
          <View style={styles.actions}>
            <TouchableOpacity style={styles.secondaryButton} onPress={() => openWhatsApp(phone)}>
              <Text style={styles.secondaryText}>Chamar cliente no WhatsApp</Text>
            </TouchableOpacity>

            {item.status === 'pending' && (
              <MainButton title="Aceitar pedido" onPress={() => updateStatus(item.id, 'accepted')} />
            )}

            {item.status === 'accepted' && (
              <MainButton title="Começar preparo" onPress={() => updateStatus(item.id, 'preparing')} />
            )}

            {item.status === 'preparing' && (
              <MainButton title="Pedido pronto" onPress={() => updateStatus(item.id, 'ready')} />
            )}

            {item.status === 'ready' && (
              <MainButton title="Chamar entregador" green onPress={() => updateStatus(item.id, 'calling_driver')} />
            )}

            {!['delivered', 'cancelled'].includes(item.status) && (
              <MainButton
                title="Cancelar pedido"
                red
                onPress={() =>
                  Alert.alert('Cancelar pedido', 'Deseja cancelar este pedido?', [
                    { text: 'Não' },
                    { text: 'Sim', onPress: () => updateStatus(item.id, 'cancelled') },
                  ])
                }
              />
            )}
          </View>
        )}
      </View>
    );
  }

  if (screen === 'login') {
    return (
      <SafeAreaView style={styles.loginContainer}>
        <StatusBar style="light" />
        <RNStatusBar barStyle="light-content" backgroundColor="#111111" />

        <ScrollView contentContainerStyle={styles.loginContent}>
          <View style={styles.brandCircle}>
            <Text style={styles.brandIcon}>🍻</Text>
          </View>

          <Text style={styles.logo}>Chama Bebidas</Text>
          <Text style={styles.subtitle}>App da Adega</Text>

          <View style={styles.apiBox}>
            <Text style={styles.apiText}>
              API: {apiOnline === null ? 'verificando...' : apiOnline ? 'online' : 'não confirmada'}
            </Text>
          </View>

          <TextInput
            style={styles.input}
            placeholder="ID da adega"
            placeholderTextColor="#777"
            value={storeId}
            onChangeText={setStoreId}
            keyboardType="numeric"
          />

          <TextInput
            style={styles.input}
            placeholder="Senha da adega"
            placeholderTextColor="#777"
            value={password}
            onChangeText={setPassword}
            secureTextEntry
          />

          <TouchableOpacity style={styles.loginButton} onPress={login} disabled={loading}>
            {loading ? <ActivityIndicator color="#111" /> : <Text style={styles.loginText}>Entrar</Text>}
          </TouchableOpacity>

          <Text style={styles.hint}>
            Se a API ainda não tiver rota de login, o app entra usando o ID encontrado em /api/stores.
          </Text>

          {stores.length > 0 && (
            <View style={styles.storeList}>
              <Text style={styles.storeListTitle}>Adegas cadastradas</Text>
              {stores.slice(0, 5).map(store => (
                <TouchableOpacity
                  key={store.id}
                  style={styles.storeOption}
                  onPress={() => {
                    setStoreId(String(store.id));
                    setStoreName(store.store_name || store.name || `Adega #${store.id}`);
                  }}
                >
                  <Text style={styles.storeOptionText}>
                    #{store.id} - {store.store_name || store.name || 'Adega'}
                  </Text>
                </TouchableOpacity>
              ))}
            </View>
          )}
        </ScrollView>
      </SafeAreaView>
    );
  }

  if (screen === 'settings') {
    return (
      <SafeAreaView style={styles.containerLight}>
        <StatusBar style="light" />
        <Header
          title="Configurações"
          subtitle={storeName || `Adega #${storeId}`}
          rightText="Voltar"
          onRight={() => setScreen('orders')}
        />

        <View style={styles.settingsBox}>
          <Info label="URL da API" value={API_URL} />
          <Info label="ID da Adega" value={storeId} />
          <Info label="Nome" value={storeName || 'Não informado'} />
          <Info label="Modo demonstração" value={usingDemo ? 'Sim' : 'Não'} />

          <MainButton title="Sair da conta" red onPress={logout} />
        </View>
      </SafeAreaView>
    );
  }

  return (
    <SafeAreaView style={styles.containerLight}>
      <StatusBar style="light" />
      <Header
        title="Chama Bebidas"
        subtitle={storeName || `Adega #${storeId}`}
        rightText="Config"
        onRight={() => setScreen('settings')}
      />

      {usingDemo && (
        <View style={styles.demoWarning}>
          <Text style={styles.demoText}>
            Mostrando pedidos de exemplo. A API ainda não retornou pedidos reais.
          </Text>
        </View>
      )}

      <View style={styles.stats}>
        <Stat title="Ativos" value={String(totals.active)} />
        <Stat title="Novos" value={String(totals.pending)} />
        <Stat title="Prontos" value={String(totals.ready)} />
      </View>

      <FlatList
        data={orders}
        keyExtractor={(item) => String(item.id)}
        renderItem={renderOrder}
        contentContainerStyle={{ padding: 16, paddingBottom: 40 }}
        refreshControl={<RefreshControl refreshing={loading} onRefresh={loadOrders} />}
        ListEmptyComponent={
          <View style={styles.empty}>
            {loading ? (
              <ActivityIndicator size="large" color="#111" />
            ) : (
              <Text style={styles.emptyText}>Nenhum pedido no momento.</Text>
            )}
          </View>
        }
      />
    </SafeAreaView>
  );
}

function Header({
  title,
  subtitle,
  rightText,
  onRight,
}: {
  title: string;
  subtitle: string;
  rightText: string;
  onRight: () => void;
}) {
  return (
    <View style={styles.header}>
      <View>
        <Text style={styles.headerTitle}>{title}</Text>
        <Text style={styles.headerSub}>{subtitle}</Text>
      </View>

      <TouchableOpacity style={styles.headerButton} onPress={onRight}>
        <Text style={styles.headerButtonText}>{rightText}</Text>
      </TouchableOpacity>
    </View>
  );
}

function Info({ label, value }: { label: string; value: string }) {
  return (
    <View style={{ marginTop: 10 }}>
      <Text style={styles.label}>{label}</Text>
      <Text style={styles.text}>{value}</Text>
    </View>
  );
}

function Stat({ title, value }: { title: string; value: string }) {
  return (
    <View style={styles.statCard}>
      <Text style={styles.statValue}>{value}</Text>
      <Text style={styles.statTitle}>{title}</Text>
    </View>
  );
}

function MainButton({
  title,
  onPress,
  green,
  red,
}: {
  title: string;
  onPress: () => void;
  green?: boolean;
  red?: boolean;
}) {
  return (
    <TouchableOpacity
      style={[styles.button, green && styles.buttonGreen, red && styles.buttonRed]}
      onPress={onPress}
    >
      <Text style={styles.buttonText}>{title}</Text>
    </TouchableOpacity>
  );
}

